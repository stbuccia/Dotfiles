"$schema" = 'https://starship.rs/config-schema.json'

# ── Layout 2 righe con frame ╭─ / ╰─ ─────────────────────────────────────────

add_newline = true

format = """
[╭─](fg:#585858)\
$os\
$directory\
$git_branch\
$git_status\
$fill\
$cmd_duration\
$time\n[╰─](fg:#585858)\
$character"""

# ── Palette Nord ────────────────────────────────────────────────────────

palette = 'nordic'

[palettes.nordic]
color_fg      = '#d8dee9'   # nord4  – testo principale
color_blue    = '#81a1c1'   # nord9  – directory
color_green   = '#a3be8c'   # nord14 – git branch / successo
color_orange  = '#d08770'   # nord12 – warning
color_purple  = '#b48ead'   # nord15 – accento
color_red     = '#bf616a'   # nord11 – errore
color_yellow  = '#ebcb8b'   # nord13 – git status / durata
color_grey    = '#4c566a'   # nord3  – decorazioni frame

# ── OS icon ────────────────────────────────────────────────────────────────────

[os]
disabled = false
format = "[$symbol ]($style)"
style = "fg:color_fg bold"

[os.symbols]
Arch             = "󰣇"
Debian           = "󰣚"
Ubuntu           = "󰕈"
Fedora           = "󰣛"
Manjaro          = ""
Mint             = "󰣭"
Pop              = ""
Raspbian         = "󰐿"
Gentoo           = "󰣨"
NixOS            = ""
openSUSE         = ""
SUSE             = ""
Redhat           = "󱄛"
RedHatEnterprise = "󱄛"
CentOS           = ""
Amazon           = ""
Android          = ""
Macos            = "󰀵"
Windows          = "󰍲"
Linux            = "󰌽"
Unknown          = ""

# ── Directory ──────────────────────────────────────────────────────────────────

[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
style = "fg:color_blue bold"
read_only = " "
read_only_style = "fg:color_red bold"
truncation_length = 4
truncate_to_repo = true
home_symbol = "~"

# ── Git branch ─────────────────────────────────────────────────────────────────

[git_branch]
format = "[$branch(:$remote_branch)]($style) "
symbol = ""
style = "fg:color_green bold"
truncation_length = 30
truncation_symbol = "…"

# ── Git status ─────────────────────────────────────────────────────────────────

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "fg:color_yellow bold"
conflicted = "~$count"
ahead      = "⇡$count"
behind     = "⇣$count"
diverged   = "⇡$ahead_count⇣$behind_count"
up_to_date = ""
untracked  = "?$count"
stashed    = "*$count"
modified   = "!$count"
staged     = "+$count"
renamed    = "»$count"
deleted    = "✘$count"

# ── Fill ───────────────────────────────────────────────────────────────────────

[fill]
symbol = " "
style = "fg:color_fg"

# ── Status exit code ───────────────────────────────────────────────────────────

[status]
disabled = false
format = "[$symbol ]($style)"
success_symbol = ""
symbol         = "[✘](fg:color_red bold)"
style          = "fg:color_red bold"
map_symbol     = true

# ── Durata comando (soglia 3s) ─────────────────────────────────────────────────

[cmd_duration]
min_time = 3_000
format   = "[took $duration ]($style)"
style    = "fg:color_yellow bold"

# ── Ora ────────────────────────────────────────────────────────────────────────

[time]
disabled    = false
format      = "[$time ]($style)"
time_format = "%H:%M:%S"
style       = "fg:color_fg bold"

# ── Carattere prompt ───────────────────────────────────────────────────────────

[character]
success_symbol = "[❯](fg:color_green bold)"
error_symbol   = "[❯](fg:color_red bold)"
vimcmd_symbol  = "[❮](fg:color_green bold)"
